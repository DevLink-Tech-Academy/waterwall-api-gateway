name: Feature request
description: Suggest a new feature or improvement for Waterwall
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Waterwall. Please describe the problem you're trying to solve before jumping to a specific implementation — it helps us find the best solution together.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, pain point, or workflow that isn't well supported today.
      placeholder: As an API publisher, I want to... because...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Sketches, API shapes, and UI mockups are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they aren't ideal.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Waterwall would this change?
      options:
        - gateway-runtime (proxy, rate limiting, WAF, circuit breaker)
        - identity-service (auth, users, API keys)
        - management-api (API lifecycle, subscriptions, plans)
        - analytics-service (dashboards, SLA, reports)
        - notification-service (email, webhook, Slack)
        - gateway-portal (developer portal UI)
        - gateway-admin (admin portal UI)
        - monetization / billing
        - deployment / ops
        - documentation
        - other
    validations:
      required: true

  - type: dropdown
    id: importance
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would meaningfully improve my workflow
        - Blocking my adoption of Waterwall
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you be willing to contribute?
      options:
        - label: I'd be willing to open a PR for this
        - label: I'd be willing to help test this

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, references to similar features in other projects, or anything else that helps.
