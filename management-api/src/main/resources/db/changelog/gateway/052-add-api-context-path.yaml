databaseChangeLog:
  - changeSet:
      id: gw-052-add-context-path-to-apis
      author: gateway-team
      changes:
        - addColumn:
            schemaName: gateway
            tableName: apis
            columns:
              - column:
                  name: context_path
                  type: varchar(100)
        - addUniqueConstraint:
            schemaName: gateway
            tableName: apis
            columnNames: context_path
            constraintName: uk_api_context_path

  - changeSet:
      id: gw-052-auto-generate-context-paths
      author: gateway-team
      comment: Generate unique context_path from existing API names using window function to handle duplicates
      changes:
        - sql:
            sql: |
              UPDATE gateway.apis
              SET context_path = sub.unique_slug
              FROM (
                SELECT id,
                  CASE
                    WHEN dup_count = 1 THEN base_slug
                    ELSE base_slug || '-' || LEFT(id::text, 4)
                  END AS unique_slug
                FROM (
                  SELECT id, name,
                    LOWER(REGEXP_REPLACE(REGEXP_REPLACE(name, '[^a-zA-Z0-9]+', '-', 'g'), '(^-|-$)', '', 'g')) AS base_slug,
                    COUNT(*) OVER (PARTITION BY LOWER(REGEXP_REPLACE(REGEXP_REPLACE(name, '[^a-zA-Z0-9]+', '-', 'g'), '(^-|-$)', '', 'g'))) AS dup_count
                  FROM gateway.apis
                  WHERE context_path IS NULL
                ) inner_q
              ) sub
              WHERE gateway.apis.id = sub.id AND gateway.apis.context_path IS NULL;
